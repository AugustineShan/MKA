[project]
name = "cninfo-cli"
version = "0.1.0"
description = "On-demand fetcher for A-share announcements from cninfo.com.cn (PDF + full-text Markdown), with announcement_filter classification."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "claude_cninfo contributors" }]
keywords = ["cninfo", "a-share", "announcement", "pdf", "finance", "china"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Topic :: Office/Business :: Financial",
]
dependencies = [
  "requests>=2.31",
  "pymupdf>=1.24",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.5",
]

[project.scripts]
cninfo = "cninfo.cli:main"

[project.urls]
Homepage = "https://github.com/rollysys/use_cninfo"
Issues = "https://github.com/rollysys/use_cninfo/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cninfo"]

[tool.ruff]
line-length = 110
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
