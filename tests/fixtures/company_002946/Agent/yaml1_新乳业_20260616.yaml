    yogurt:                                  # 低温酸奶
      revenue_family: factor_product
      src: "#低温酸奶"
      base:
        base_year: 2024
        unit: { volume: "10k_ton", price: "cny_per_ton", revenue: "million_cny" }
        unit_factor_to_million_cny: 100
      factors:
        - key: volume
          label: 销量
          base: 24.73                        # 万吨
          projection: { kind: yoy, values: [0.08, 0.07, 0.06, 0.05, 0.04] }
        - key: price
          label: 吨价
          base: 11191                        # 元/吨
          projection: { kind: yoy, values: [0.002, 0.002, 0.002, 0.002, 0.002] }
      history:
        note: "2014量价seed占位(销量4.00/吨价23855异常偏高),收入headline可靠;成本走整体毛利率,分线不提供"
        series:
          revenue: { 2014: 954.2, 2015: 1257.8, 2016: 1575.0, 2017: 1814.8, 2018: 2036.6, 2019: 2308.4, 2020: 2214.9, 2021: 2395.4, 2022: 2419.4, 2023: 2581.8, 2024: 2768.1 }
          volume:  { 2014: 4.00, 2015: 11.79, 2016: 15.10, 2017: 17.18, 2018: 19.24, 2019: 21.54, 2020: 20.47, 2021: 21.49, 2022: 21.71, 2023: 23.12, 2024: 24.73 }
          price:   { 2014: 23855, 2015: 10673, 2016: 10429, 2017: 10566, 2018: 10587, 2019: 10715, 2020: 10822, 2021: 11146, 2022: 11146, 2023: 11169, 2024: 11191 }

    ambient:                                 # 常温
      revenue_family: factor_product
      src: "#常温"
      base:
        base_year: 2024
        unit: { volume: "10k_ton", price: "cny_per_ton", revenue: "million_cny" }
        unit_factor_to_million_cny: 100
      factors:
        - key: volume
          label: 销量
          base: 55.09                        # 万吨
          projection: { kind: yoy, values: [-0.05, -0.04, -0.03, -0.02, -0.01] }
        - key: price
          label: 吨价
          base: 7859                         # 元/吨
          projection: { kind: yoy, values: [-0.005, 0, 0, 0, 0] }
      history:
        note: "2018/2019历史缺口(口径不可分);2014量价seed占位(吨价47903异常);2023/2024收入*=年报液体乳plug;成本走整体毛利率,分线不提供"
        series:
          revenue: { 2014: 1916.1, 2015: 1833.4, 2016: 1683.1, 2017: 1752.3, 2020: 2712.4, 2021: 4069.2, 2022: 4240.2, 2023: 4621.5, 2024: 4329.3 }
          volume:  { 2014: 4.00, 2015: 28.58, 2016: 25.68, 2017: 25.95, 2020: 38.16, 2021: 53.43, 2022: 55.03, 2023: 58.60, 2024: 55.09 }
          price:   { 2014: 47903, 2015: 6415, 2016: 6554, 2017: 6753, 2020: 7108, 2021: 7617, 2022: 7706, 2023: 7886, 2024: 7859 }

    other_business:                          # 边缘业务(牧业、奶粉等)
      revenue_family: growth
      src: "#边缘业务"
      base:
        base_year: 2024
        revenue: 829.2                       # 百万元
        unit: { revenue: "million_cny" }
        unit_factor_to_million_cny: 1
      knobs:
        revenue_yoy: [0, -0.10, -0.10, -0.10, -0.10]
      history:
        note: "2024收入*=总收入-年报液体乳核对项plug;成本走整体毛利率,分线不提供"
        series:
          revenue: { 2014: 219.7, 2015: 335.2, 2016: 217.4, 2017: 142.1, 2018: 186.3, 2019: 264.4, 2020: 475.9, 2021: 665.7, 2022: 1230.2, 2023: 1328.6, 2024: 829.2 }

# ── 毛利:再参数化翻转(整体毛利率手拍) ──
income.gpm:
  kind: knob
  values: [0.292, 0.299, 0.305, 0.311, 0.316]
  src: "#整体毛利率(主动覆盖·参数化翻转)"

# ── 费用率 ──
income.cost_rates.biz_tax_surchg: { kind: knob, values: [0.00497, 0.00497, 0.00497, 0.00497, 0.00497], src: "#营业税金及附加" }
income.cost_rates.sell_exp:       { kind: knob, values: [0.154, 0.154, 0.154, 0.154, 0.154], src: "#销售费用" }
income.cost_rates.admin_exp:      { kind: knob, values: [0.036, 0.036, 0.036, 0.036, 0.036], src: "#管理费用" }
income.cost_rates.rd_exp:         { kind: knob, values: [0.0046, 0.0046, 0.0046, 0.0046, 0.0046], src: "#研发费用" }

# ── 财务费用:利息净额引擎倒算不写;其他财务费用(外生·非利息)必写且嵌income.financial_expense下 ──
income.financial_expense.other_fin_exp_abs: { kind: knob, values: [-1.47, -1.47, -1.47, -1.47, -1.47], src: "#其他财务费用(外生·非利息)" }

# ── below-OP: cost_abs(存负·与.md同号) ──
income.cost_abs.assets_impair_loss: { kind: knob, values: [-20, -20, -20, -20, -20], src: "#资产减值损失(存负·与.md同号)" }
income.cost_abs.credit_impa_loss:   { kind: knob, values: [0, 0, 0, 0, 0], src: "#信用减值损失(存负·与.md同号)" }

# ── below-OP: operating_adjustments_abs(亏损存负) ──
income.operating_adjustments_abs.oth_income:        { kind: knob, values: [40, 40, 40, 40, 40], src: "#其他收益" }
income.operating_adjustments_abs.invest_income:     { kind: knob, values: [0, 0, 0, 0, 0], src: "#投资净收益" }
income.operating_adjustments_abs.fv_value_chg_gain: { kind: knob, values: [0, 0, 0, 0, 0], src: "#公允价值变动" }
income.operating_adjustments_abs.asset_disp_income: { kind: knob, values: [-70, -30, -30, -30, -30], src: "#资产处置收益(亏损存负)" }

# ── below-line ──
income.below_line_abs.non_oper_income: { kind: knob, values: [10.85, 10.85, 10.85, 10.85, 10.85], src: "#营业外收入" }
income.below_line_abs.non_oper_exp:    { kind: knob, values: [47.39, 47.39, 47.39, 47.39, 47.39], src: "#营业外支出(引擎做减项,存正值)" }

# ── 税率 / 少数股东 ──
income.effective_tax_rate: { kind: knob, values: [0.1461, 0.1461, 0.1461, 0.1461, 0.1461], src: "#有效税率" }
income.minority_ratio:     { kind: knob, values: [0.0214, 0.0214, 0.0214, 0.0214, 0.0214], src: "#少数股东损益率" }

# ── 终值 ──
terminal:
  explicit_end: 2029
  fade:
    to_year: 2034
    kind: linear
    fade_paths: [model.revenue_yoy]
    hold_paths: [income.gpm, income.cost_rates.sell_exp, income.cost_rates.admin_exp, income.cost_rates.rd_exp, income.cost_rates.biz_tax_surchg]
  perpetual_growth: 0.03
  src: "#往后几年"

# ── B类:stash ──
