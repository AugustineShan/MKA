    毛利口径翻转: "本版毛利改自上而下(整体毛利率当旋钮);原外部模型自下而上(各线吨价×吨成本折出毛利),因报表复杂分线毛利率口径有坑故翻转"
    2014_2017毛利率不可比: "2014-2017整体毛利率31.4%-34.7%,运输费重分类前口径不可比"
  溯源附注:
    有效税率查证: "2024年报'五、税费·2税收优惠':西部大开发2021/1/1-2030/12/31减按15%(四川乳业/昆明雪兰/宁夏夏进等);朝日唯品高新2024-2026减按15%;增值税小规模/小微企业优惠至2027/12/31;老板判断优惠到期续期,不设拐点"
    其他财务费用口径: "2024年报'52、财务费用'附注:其他财务费用=财政贴息-3.82+净汇兑收益-0.21+手续费及其他+2.56=-1.47;按年报口径平推"
    毛利参数化翻转: "老板拍板:毛利从分线派生翻转为整体毛利率手拍,分线吨成本/毛利率退为收纳区参考"
    营业外支出平推: "2024营业外支出从2023的8.0跳增至47.4,曾就一次性可能性提示,老板拍板按47.39平推不回归常态"
  定性情报:
    - "鲜立方战略/鲜酸双强;低温鲜奶靠并购建立半径内竞争优势(过去低温鲜CAGR~19%,仍在渗透)"
    - "24小时高端系列占比提升、收入增超15%(2024年报);高端化是结构升级抓手"
    - "组织架构:总部操盘+地产奶+朝日唯品高端全国化(发达国家乳业龙头Dean Foods/Saputo主流架构,报表难拆、需给折价)"
    - "动能:24年诉求收入争10%、利润28%(净利率提升0.7pct+),27年前净利率翻倍目标;新一期股权激励上半年落地"
    - "催化:股权激励落地、星巴克四川等餐饮供应链进展、24Q1非经减少"
    - "风险:拼盘公司管理松散、低温酸奶赛道整体向下、常温竞争力一般、报表复杂季报扰动大"

