meta:
  company: "002946.SZ"
  name: "新乳业"
  src: "新乳业-20260616-核心假设.md"
  mode: init
  horizon: [2025, 2026, 2027, 2028, 2029]

income.revenue:
  kind: decomposition
  rollup: sum
  src: "#收入"
  segments:
    fresh_milk:                              # 低温鲜奶
      revenue_family: factor_product
      src: "#低温鲜奶"
      base:
        base_year: 2024
        unit: { volume: "10k_ton", price: "cny_per_ton", revenue: "million_cny" }
        unit_factor_to_million_cny: 100
      factors:
        - key: volume
          label: 销量
          base: 19.82                        # 万吨
          projection: { kind: yoy, values: [0.07, 0.06, 0.06, 0.06, 0.06] }
        - key: price
          label: 吨价
          base: 13821                        # 元/吨
          projection: { kind: yoy, values: [0.003, 0.003, 0.003, 0.003, 0.003] }
      history:
        note: "2014量价seed占位(销量4.00/吨价11059);成本走整体毛利率,分线不提供"
        series:
          revenue: { 2014: 442.4, 2015: 488.9, 2016: 577.8, 2017: 712.6, 2018: 888.1, 2019: 1133.3, 2020: 1345.4, 2021: 1836.5, 2022: 2116.7, 2023: 2552.0, 2024: 2738.8 }
          volume:  { 2014: 4.00, 2015: 4.95, 2016: 5.90, 2017: 6.78, 2018: 8.20, 2019: 9.51, 2020: 10.66, 2021: 13.85, 2022: 15.65, 2023: 18.52, 2024: 19.82 }
