    - {field: income_tax, label: 所得税费用, category: tax}
    - {field: n_income, label: 净利润(含少数股东损益), category: subtotal}
    - {field: n_income_attr_p, label: 净利润(不含少数股东损益), category: attribution}
    - {field: minority_gain, label: 少数股东损益, category: attribution}
    - {field: oth_compr_income, label: 其他综合收益, category: comprehensive}
    - {field: t_compr_income, label: 综合收益总额, category: comprehensive}
    - {field: compr_inc_attr_p, label: 归属于母公司(或股东)的综合收益总额, category: comprehensive}
    - {field: compr_inc_attr_m_s, label: 归属于少数股东的综合收益总额, category: comprehensive}
