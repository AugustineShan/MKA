version: 1
statements:
  income:
    name: 利润表
    unit: 百万元
    category_order:
    - revenue_item
    - cost_item
    - operating_adjustment
    - below_line
    - tax
    - attribution
    - comprehensive
    - sub_item
    - derived
    category_labels:
      revenue_item: 收入项
      cost_item: 成本项
      operating_adjustment: 营业利润调节项
      below_line: 营业外收支
      tax: 所得税
      attribution: 净利润归属
      comprehensive: 综合收益
      sub_item: 子明细（已含于父项，不重复加总）
      derived: 衍生/不参与加总
      subtotal: 小计/合计
    fields:
    - {field: revenue, label: 营业收入, category: revenue_item}
    - {field: comm_income, label: 手续费及佣金收入, category: revenue_item}
    - {field: int_income, label: 利息收入, category: revenue_item}
