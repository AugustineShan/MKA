    - {field: n_oth_income, label: 其他经营净收益, category: revenue_item}
    - {field: n_sec_tb_income, label: 代理买卖证券业务净收入, category: revenue_item}
    - {field: n_sec_uw_income, label: 证券承销业务净收入, category: revenue_item}
