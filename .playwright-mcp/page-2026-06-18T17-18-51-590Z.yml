            - listitem [ref=e167]: 低温鲜奶是唯一保持长期稳定量增（6%）的品类，且吨价最高（13821元/吨），是核心增长引擎。
            - listitem [ref=e168]: 低温酸奶量增逐年递减（从8%降至2%），显示该品类正逐步进入成熟期。
            - listitem [ref=e169]: 常温产品主动收缩（量减5%至0%），且吨价最低（7859元/吨），其占比下降是整体毛利率改善的主要来源。
            - listitem [ref=e170]: 边缘业务持续出清（2026年起维持-10%增速），进一步优化业务结构。
            - listitem [ref=e171]: 整体毛利率从29.2%稳步提升至31.4%，并非依赖提价（各线价格基本持平或微降），而是高毛利品类占比提升带来的结构红利。
